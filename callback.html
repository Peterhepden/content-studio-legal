<!DOCTYPE html>
<html>
<head><title>TikTok Auth Callback</title></head>
<body>
<h1>TikTok Authorization</h1>
<p id="status">Reading authorization code...</p>
<p><strong>Code:</strong> <code id="code"></code></p>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');
if (code) {
  document.getElementById('code').textContent = code;
  document.getElementById('status').textContent = 'Success! Copy this code:';
} else if (error) {
  document.getElementById('status').textContent = 'Error: ' + error;
} else {
  document.getElementById('status').textContent = 'No code received.';
}
</script>
</body>
</html>
